<!doctype html>
<html>
    <head>
        <meta charset="UTF-8" />
        <title>Simple Node Editor</title>
        <link rel="stylesheet" href="node-editor.css" />
    </head>
    <body>
        <div id="canvas">
        </div>

        <script src="node-editor.js"></script>
        <script>
            // Initialize the NodeEditor library
            const editor = new NodeEditor("canvas");

            // Replicate the original initial state
            editor.addNode("node1", "Node 1", 100, 100, { in: false, out: true });
            editor.addNode("node2", "Node 2", 300, 150, { in: true, out: true });

            // Ensure the lines update properly on load
            editor.updateLines();
        </script>
    </body>
</html>
